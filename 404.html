<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      const base = '/LBCA-Monitoring-System';
      const path = window.location.pathname.replace(base, '') || '/';
      const search = window.location.search;
      sessionStorage.setItem('redirect', path + search);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
