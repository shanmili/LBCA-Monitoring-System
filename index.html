<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/LBCA-Monitoring-System/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lbca-project</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      var redirect = sessionStorage.getItem('redirect');
      if (redirect) {
        sessionStorage.removeItem('redirect');
        var base = '/LBCA-Monitoring-System';
        var newUrl = base + (redirect === '/' ? '' : redirect);
        window.history.replaceState(null, '', newUrl);
      }
    </script>
  </body>
</html>
